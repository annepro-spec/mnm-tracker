<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNM Ecosystem Live Tracker</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#0a0a0f;
  color:#e0e0e5;
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  padding:20px;
}
h1{
  text-align:center;
  font-size:clamp(1.4rem,4vw,2.2rem);
  background:linear-gradient(90deg,#00f0ff,#a855f7,#ff6b95);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:20px auto 10px;
  letter-spacing:-.5px;
}
.subtitle{text-align:center;color:#888;font-size:.9rem;margin-bottom:30px}
.global-progress{
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:20px 24px;
  max-width:700px;
  margin:0 auto 30px;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
}
.global-progress h2{font-size:1rem;color:#ccc;margin-bottom:12px}
.progress-bar-bg{
  background:rgba(255,255,255,.08);
  border-radius:10px;
  height:14px;
  overflow:hidden;
  position:relative;
}
.progress-bar-fill{
  height:100%;
  border-radius:10px;
  background:linear-gradient(90deg,#00f0ff,#a855f7,#ff6b95);
  transition:width .6s cubic-bezier(.25,.8,.25,1);
  width:0%;
}
.progress-text{
  text-align:center;
  margin-top:8px;
  font-size:.85rem;
  color:#999;
}
.progress-text span{color:#00f0ff;font-weight:700}
.dynamic-msg{
  text-align:center;
  color:#a855f7;
  font-style:italic;
  font-size:.85rem;
  margin-top:6px;
  min-height:1.2em;
}
.phase{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  backdrop-filter:blur(8px);
  transition:border-color .4s;
}
.phase:hover{border-color:rgba(168,168,255,.2)}
.phase-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
  cursor:pointer;
}
.phase-header h3{
  font-size:1.1rem;
  display:flex;
  align-items:center;
  gap:8px;
}
.badge{
  font-size:.7rem;
  padding:3px 10px;
  border-radius:99px;
  font-weight:700;
  letter-spacing:.5px;
}
.badge-todo{background:rgba(255,255,255,.08);color:#666}
.badge-progress{background:rgba(0,240,255,.15);color:#00f0ff}
.badge-done{background:rgba(0, 200, 100,.2);color:#00c864}
.task-list{list-style:none}
.task-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:10px;
  transition:background .3s;
  cursor:pointer;
}
.task-item:hover{background:rgba(255,255,255,.04)}
.task-item input[type="checkbox"]{
  -webkit-appearance:none;
  appearance:none;
  width:20px;height:20px;
  border:2px solid rgba(255,255,255,.2);
  border-radius:6px;
  cursor:pointer;
  position:relative;
  flex-shrink:0;
  transition:all .3s;
}
.task-item input[type="checkbox"]:checked{
  background:linear-gradient(135deg,#00f0ff,#a855f7);
  border-color:transparent;
}
.task-item input[type="checkbox"]:checked::after{
  content:'✓';
  position:absolute;
  color:#fff;
  font-size:12px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.task-label{.done{text-decoration:line-through;color:#555}
.phase-progress-mini{
  height:4px;
  background:rgba(255,255,255,.06);
  border-radius:4px;
  margin-top:12px;
  overflow:hidden;
}
.phase-progress-mini-fill{
  height:100%;
  border-radius:4px;
  transition:width .5s;
}
.c0{background:#00f0ff}
.c1{background:#a855f7}
.c2{background:#ff6b95}
.c3{background:#00c864}
.c4{background:#ffd700}
.phase-desc{font-size:.8rem;color:#777;margin-bottom:8px;font-style:italic}
@media(max-width:600px){
  body{padding:12px}
  .phase{padding:14px}
  .phase-header h3{font-size:.95rem}
}
</style>
</head>
<body>
<h1>Mindful Neo-Managers — Ecosystem Tracker</h1>
<p class="subtitle">Coche chaque tâche au fur et à mesure. Ton avancement est sauvegardé localement.</p>

<div class="global-progress">
  <h2>Progression globale</h2>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="globalFill"></div></div>
  <p class="progress-text"><span id="globalPct">0</span>% complété — <span id="globalDone">0</span>/<span id="globalTotal">0</span> tâches</p>
  <p class="dynamic-msg" id="dynMsg"></p>
</div>

<div id="phases"></div>

<script>
const DATA=[
{
  name:"Phase 0 — Fondations",
  icon:"🏗️",
  color:"c0",
  desc:{default:"Poser les bases solides de l'écosystème",half:"Les fondations prennent forme !",done:"Fondations verrouillées ✓"},
  tasks:[
    "Brand voice MNM définie et documentée",
    "Positionnement marché validé (personas, concurrence)",
    "Identité visuelle (couleurs, typo, logo concept)",
    "ELYUN SOCIETY LLC — structure légale opérationnelle",
    "Domaine + hebergement en place",
    "GHL configuré (CRM, email, pipelines)",
    "Stratégie de contenu initiale (piliers éditoriaux)"
  ]
},
{
  name:"Phase 1 — Content Engine",
  icon:"✘️",
  color:"c1",
  desc:{default:"Construire la machine à contenu",half:"La machine tourne, continue !",done:"Content engine opérationnel 🚀"},
  tasks:[
    "Profil LinkedIn optimisé (banner, headline, about)",
    "10 premiers posts LinkedIn ready-to-publish",
    "Calendrier éditorial M1 (rotation des 6 piliers)",
    "Lead magnet créé (scorecard ou mini-guide)",
    "Welcome sequence email (3 emails minimum)",
    "Premier article SEO publié",
    "Système de batching installé (routine hebdo)"
  ]
},
{
  name:"Phase 2 — Lead Generation",
  icon:"🧲️",
  color:"c2",
  desc:{default:"Attirer et capturer les bons leads",half:"Les leads commencent à arriver !",done:"Pipeline de leads actif 💪"},
  tasks:[
    "Landing page lead magnet live et testée",
    "Funnel GHL complet (opt-in → sequence ‒ offre)",
    "Pixel Meta + Google Ads installés",
    "Première campagne Meta Ads test (budget mini)",
    "Retargeting configuré",
    "Scoring leads dans GHL (chaud / tiède / froid)"
  ]
},
{
  name:"Phase 3 — Product Launch",
  icon:" 🚀",
  color:"c3",
  desc:{default:"Lancer le premier produit payant",half:"Le lancement est en cours !",done:"Premier produit lancé avec succès 🎉"},
  tasks:[
    "Ebook / formation finalisé et livrable",
    "Page de vente long-form optimisée",
    "Séquence de lancement (teasing, ouverture, urgence)",
    "Système de paiement testé (Stripe / GHL)",
    "Séquence post-achat (onboarding + témoignage)",
    "Premières ventes analysées (CPA, taux conversion)"
  ]
},
{
  name:"Phase 4 — Scale & Automate",
  icon:"⚡️",
  color:"c4",
  desc:{default:"Automatiser et scaler sans présence",half:"L'automatisation avance, la liberté approche !",done:"Écosystème autonome — mission accomplie 🏆"},
  tasks:[
    "Automations N8N core actives (lead triage, tagging)",
    "Scaling ads — budget augmenté sur campagnes rentables",
    "Deuxième produit en préparation ou lancé",
    "Système de support client automatisé",
    "Revenus récurrents > 2000€/mois",
    "Dashboard KPI en place (revenu, leads, conversion)",
    "Anne travaille < 4h/jour sur le business"
  ]
}
];

const SK='mnm_eco_v2';
let state=JSON.parse(localStorage.getItem(SK)||'{}');

const msgs=[
  {min:0,max:5,msg:"Chaque grand voyage commence par un premier pas."},
  {min:5,max:20,msg:"Les fondations se construisent. Continue."},
  {min:20,max:40,msg:"La machine prend forme. Tu es sur le bon chemin."},
  {min: 40,max:60,msg:"Mi-parcours ! La clarté s'installe."},
  {min:60,max:80,msg:"La ligne d'arrivée se dessine. Fini vaut mieux que parfait."},
  {min:80,max:99,msg:"Presque autonome. La liberté est là."},
  {min:100,max:100,msg:"🌀 Écosystème complet. Tu as construit quelque chose de rare."}
];

function render(){
  const c=document.getElementById('phases');
  c.innerHTML='';
  let total=0,done=0;
  DATA.forEach((p,idx)=>{
    const d=document.createElement('div');
    d.className='phase';
    let pd=0,pt=p.tasks.length;
    total+=pt;
    let tasksHtml=p.tasks.map((t,j)=>{
      const k=`${idx}_${j}`;
      const ch=state[k]===true;
      if(ch){pd++;done++;}
      return `<li class="task-item" onclick="toggle('${k}')">
        <input type="checkbox" ${ch?'checked':''} tabindex="-1">
        <span class="task-label ${ch?'done':''}">${t}</span>
      </li>`;
    }).join('');
    const pct=pt?Math.round(pd/pt*100):0;
    const bcls=pct===100?'badge-done':pct>0?'badge-progress':'badge-todo';
    const desc=pct===100?p.desc.done:pct>=50?p.desc.half:p.desc.default;
    d.innerHTML=`
      <div class="phase-header">
        <h3>${p.icon} ${p.name}</h3>
        <span class="badge ${bcls}">${pct}%</span>
      </div>
      <p class="phase-desc">${desc}</p>
      <ul class="task-list">${tasksHtml}</ul>
      <div class="phase-progress-mini"><div class="phase-progress-mini-fill ${p.color}" style="width:${pct}%"></div></div>
    `;
    c.appendChild(d);
  });
  const gp=total?Math.round(done/total*100):0;
  document.getElementById('globalFill').style.width=gp+'%';
  document.getElementById('globalPct').textContent=gp;
  document.getElementById('globalDone').textContent=done;
  document.getElementById('globalTotal').textContent=total;
  const m=msgs.find(x=>gp>=x.min&&gp<=x.max);
  document.getElementById('dynMsg').textContent=m?m.msg:'';
}

function toggle(k){
  state[k]=!state[k];
  if(!state[k])delete state[k];
  localStorage.setItem(SK,JSON.stringify(state));
  render();
}

render();
</script>
</body>
</html>
